name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag without v (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build -p rpython_cli --release
      - name: Package tarball
        run: chmod +x scripts/package-release.sh && ./scripts/package-release.sh "${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: rpythonc-${{ matrix.target }}
          path: |
            dist/rpythonc-${{ matrix.target }}.tar.gz
            dist/rpythonc-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Flatten artifacts
        run: |
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} dist/ \;
          ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          files: dist/*.tar.gz dist/*.sha256
          generate_release_notes: true
