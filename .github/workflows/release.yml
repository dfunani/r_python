name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag without v (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p rpython_cli --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        env:
          REF_NAME: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/rpythonc" dist/
          cp LICENSE README.md INSTALL.md dist/
          tar -czvf "rpythonc-${VERSION}-${{ matrix.target }}.tar.gz" -C dist .
          shasum -a 256 "rpythonc-${VERSION}-${{ matrix.target }}.tar.gz" > "rpythonc-${VERSION}-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: rpythonc-${{ matrix.target }}
          path: |
            rpythonc-*-${{ matrix.target }}.tar.gz
            rpythonc-*-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      # Stable filenames for /releases/latest/download/... (install.sh, website)
      - name: Add latest-download aliases
        run: |
          shopt -s globstar nullglob
          for f in assets/**/rpythonc-*; do
            base=$(basename "$f")
            alias=$(echo "$base" | sed -E 's/^rpythonc-[0-9]+\.[0-9]+\.[0-9]+-/rpythonc-/')
            if [ "$base" != "$alias" ]; then
              cp "$f" "assets/$alias"
            fi
          done
          find assets -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: rPython ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          files: assets/**/*
          generate_release_notes: true
